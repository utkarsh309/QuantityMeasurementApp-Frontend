<app-navbar></app-navbar>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-icon">⚖️</div>
      <div class="brand-name">Quan<span>ment</span></div>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join and start measuring quantities</p>

    <!-- Alert -->
    <div class="alert" [class.show]="alertMsg" [class.alert-error]="alertType==='error'" [class.alert-success]="alertType==='success'">
      <span>{{ alertType === 'error' ? '⚠️' : '✅' }}</span>
      <span>{{ alertMsg }}</span>
    </div>

    <div class="auth-form">
      <div class="field-group">
        <label class="field-label" for="username">Username</label>
        <input id="username" class="field-input" type="text"
               placeholder="Choose a username"
               autocomplete="username"
               [(ngModel)]="username" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input id="password" class="field-input" type="password"
               placeholder="Create a password (min 6 chars)"
               autocomplete="new-password"
               [(ngModel)]="password" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password2">Confirm Password</label>
        <input id="password2" class="field-input" type="password"
               placeholder="Repeat your password"
               autocomplete="new-password"
               [(ngModel)]="password2"
               (keyup.enter)="onSubmit()" />
      </div>

      <button class="btn-primary btn-auth"
              [class.loading]="loading"
              [disabled]="loading"
              (click)="onSubmit()">
        <span class="btn-text">Create Account</span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="auth-footer">
      Already have an account? <a (click)="navigate('/auth/login')" style="cursor:pointer">Sign in</a>
    </div>

  </div>
</div>
