<app-navbar></app-navbar>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-icon">⚖️</div>
      <div class="brand-name">Quan<span>ment</span></div>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <!-- Alert -->
    <div class="alert" [class.show]="alertMsg" [class.alert-error]="alertType==='error'" [class.alert-success]="alertType==='success'">
      <span>{{ alertType === 'error' ? '⚠️' : '✅' }}</span>
      <span>{{ alertMsg }}</span>
    </div>

    <!-- Google OAuth -->
    <button class="btn-google" type="button" (click)="loginWithGoogle()">
      <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="auth-divider">OR</div>

    <!-- Login Form -->
    <div class="auth-form">
      <div class="field-group">
        <label class="field-label" for="username">Username</label>
        <input id="username" class="field-input" type="text"
               placeholder="Enter your username"
               autocomplete="username"
               [(ngModel)]="username"
               (keyup.enter)="onSubmit()" />
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <input id="password" class="field-input" type="password"
               placeholder="Enter your password"
               autocomplete="current-password"
               [(ngModel)]="password"
               (keyup.enter)="onSubmit()" />
      </div>

      <button class="btn-primary btn-auth"
              [class.loading]="loading"
              [disabled]="loading"
              (click)="onSubmit()">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="auth-footer">
      Don't have an account? <a (click)="navigate('/auth/signup')" style="cursor:pointer">Create one</a>
    </div>

  </div>
</div>
